name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "apps/spora-server/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/spora-server/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # TODO: Uncomment and configure when ready to push images
      # - name: Log in to GitHub Container Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/spora-server/Dockerfile
          push: false  # Set to true when registry login is configured
          tags: |
            ghcr.io/${{ github.repository }}/spora-server:latest
            ghcr.io/${{ github.repository }}/spora-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
